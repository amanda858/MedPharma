services:
  - type: web
    name: medpharma-hub
    runtime: python
    region: oregon
    # NOTE: a persistent disk (below) requires a PAID instance type. On the
    # free plan the /data disk is NOT mounted and ALL data (clients, chats,
    # claims, encryption key) is wiped on every redeploy and every spin-down.
    # Upgrade to "starter" in the Render dashboard to make /data persistent.
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /healthz
    disk:
      name: medpharma-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SERVICE
        value: hub
      - key: DB_PATH
        value: /data/leads.db
      - key: HUNTER_API_KEY
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM
        # Must match a SendGrid Verified Sender or authenticated domain.
        # lexi@medprosc.com was verified via Single Sender on 2026-06-10.
        value: lexi@medprosc.com
      - key: NOTIFY_EMAIL
        value: eric@medprosc.com
      - key: NOTIFY_PHONE
        value: +18036263500
      - key: NOTIFY_ON_USERS
        value: "*"
      - key: NOTIFY_IN_APP_ONLY
        value: "0"
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
