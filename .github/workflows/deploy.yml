name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy — medpharma-hub
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.render.com/deploy/srv-d6c8fb3nv86c73e79oug?key=${{ secrets.RENDER_DEPLOY_KEY }}")
          echo "Render deploy HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "202" ]; then
            echo "Deploy triggered successfully"
          else
            echo "::error::Deploy hook returned unexpected status $STATUS"
            exit 1
          fi
