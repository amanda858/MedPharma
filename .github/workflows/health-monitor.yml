name: Health Monitor

# Runs the deep sweep every hour against the live service.
# Fails (visible in GH Actions UI + email) if anything is degraded.

on:
  schedule:
    - cron: "0 * * * *"   # top of every hour
  workflow_dispatch: {}    # manual trigger button
  push:
    branches: [main]
    paths:
      - "app/**"
      - "render.yaml"
      - "requirements.txt"

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install httpx
        run: pip install httpx
      - name: Wait for Render deploy (push-triggered only)
        if: github.event_name == 'push'
        run: |
          echo "Push detected — waiting 4 minutes for Render to finish deploying..."
          sleep 240
      - name: Wake server
        run: |
          # 30 attempts × 15s = up to 7.5 min — handles cold starts and post-deploy restarts
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://medpharma-hub.onrender.com/healthz || echo 000)
            echo "wake attempt $i: $CODE"
            [ "$CODE" = "200" ] && break
            sleep 15
          done
      - name: Run deep sweep
        run: python3 .vscode/deep_sweep.py
