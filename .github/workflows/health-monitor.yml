name: Health Monitor

# Runs a deep sweep every hour against the live service.
# Fails (visible in GH Actions UI + email) if anything is degraded.
# NOTE: Push trigger removed — it caused false failures because Render free-tier
# takes 6-10 min to deploy but the sweep started after only 4 min.
# The hourly schedule catches real issues within 60 min without the noise.

on:
  schedule:
    - cron: "0 * * * *"   # top of every hour
  workflow_dispatch: {}    # manual trigger button

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install httpx
        run: pip install httpx
      - name: Wake server
        run: |
          # 30 attempts × 15s = up to 7.5 min — handles cold starts and post-deploy restarts
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://medpharma-hub.onrender.com/healthz || echo 000)
            echo "wake attempt $i: $CODE"
            [ "$CODE" = "200" ] && break
            sleep 15
          done
      - name: Run deep sweep
        run: python3 .vscode/deep_sweep.py
