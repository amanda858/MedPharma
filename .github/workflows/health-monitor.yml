name: Health Monitor

# Manual-only — run via Actions tab when you want to check the service.
# Automatic schedule removed to stop hourly failure email notifications.

on:
  workflow_dispatch: {}    # trigger manually from Actions tab only

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install httpx
        run: pip install httpx
      - name: Wake server
        run: |
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://medpharma-hub.onrender.com/healthz || echo 000)
            echo "wake attempt $i: $CODE"
            [ "$CODE" = "200" ] && break
            sleep 15
          done
      - name: Run deep sweep
        run: python3 .vscode/deep_sweep.py
